<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speech Bubble</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 8px;
    }
    #bubble {
      background: rgba(255, 255, 255, 0.98);
      color: #1a1b2e;
      padding: 6px 14px;
      border-radius: 16px;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 12px;
      font-weight: 500;
      line-height: 1.4;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      max-width: 240px;
      width: max-content;
      text-align: center;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
    }
    #bubble.visible {
      opacity: 1;
      transform: translateY(0);
    }
    #bubble.chat-active {
      width: 240px;
      text-align: left;
    }
    #close-btn {
      position: absolute;
      top: 4px;
      right: 8px;
      background: transparent;
      border: none;
      color: rgba(26, 27, 46, 0.4);
      font-size: 14px;
      cursor: pointer;
      font-weight: bold;
      line-height: 1;
      padding: 2px;
      z-index: 10;
    }
    #close-btn:hover {
      color: rgba(26, 27, 46, 0.8);
    }
    #chat-input {
      width: 100%;
      border: none;
      outline: none;
      background: rgba(0, 0, 0, 0.05);
      border-radius: 8px;
      padding: 6px 10px;
      font-family: inherit;
      font-size: 11px;
      color: #1a1b2e;
      margin-top: 6px;
      border: 1px solid rgba(0, 0, 0, 0.1);
    }
    #chat-input::placeholder {
      color: rgba(26, 27, 46, 0.45);
    }
    #bubble::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 8px solid rgba(255, 255, 255, 0.98);
    }
  </style>
</head>
<body>
  <div id="bubble">
    <button id="close-btn" style="display: none;">&times;</button>
    <div id="speech-text">...</div>
    <div id="chat-container" style="display: none;">
      <input type="text" id="chat-input" placeholder="Chat with pet..." />
    </div>
  </div>
  <script type="module" src="./speech.ts"></script>
</body>
</html>
